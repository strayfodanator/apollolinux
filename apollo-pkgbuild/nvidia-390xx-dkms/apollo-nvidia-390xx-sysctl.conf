# Apollo Linux — nvidia-390xx sysctl configuration
# Installed to /usr/lib/sysctl.d/apollo-nvidia-390xx.conf
# Optimizations for legacy NVIDIA hardware on kernel 6.x

# Allow nvidia-uvm to create memory mappings
vm.overcommit_memory = 1

# Reduce swapping aggressiveness (beneficial for systems with ≥4GB RAM)
vm.swappiness = 10

# Increase dirty ratio for discrete GPU memory operations
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
