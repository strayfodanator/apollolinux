# Apollo Linux — nvidia-390xx DRM outputclass configuration
# Installed to /usr/share/X11/xorg.conf.d/10-apollo-nvidia-390xx-drm.conf

Section "OutputClass"
    Identifier  "apollo-nvidia-390xx"
    MatchDriver "nvidia-drm"
    Driver      "nvidia"
    Option      "AllowEmptyInitialConfiguration"
    Option      "PrimaryGPU" "yes"
    ModulePath  "/usr/lib/xorg/modules/drivers"
    ModulePath  "/usr/lib/xorg/modules"
EndSection

# Legacy card: disable KMS by default for compatibility
# Apollo's hardware detection may override this at install time
Section "Device"
    Identifier  "Apollo NVIDIA Legacy 390xx"
    Driver      "nvidia"
    Option      "NoLogo" "1"
    Option      "RenderAccel" "1"
    Option      "TripleBuffer" "1"
    Option      "metamodes" "nvidia-auto-select +0+0 {ForceFullCompositionPipeline=On}"
EndSection
