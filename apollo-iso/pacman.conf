# Apollo Linux — pacman.conf for archiso build
# Used during ISO construction, not the final system config

[options]
HoldPkg      = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Apollo Linux custom repository (driver packages, Apollo components)
# During build: points to local build artifacts
# After install: will point to repo.apollolinux.org
[apollo]
SigLevel = Optional TrustAll
Server = file://$repo/../driver-cache/$arch
Server = file://$repo/../../apollo-pkgbuild/repo/$arch
