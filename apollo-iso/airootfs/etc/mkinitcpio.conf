# Apollo Linux — mkinitcpio configuration
# /etc/mkinitcpio.conf
#
# Custom initramfs for Apollo Linux:
#   - Plymouth boot splash
#   - DKMS module support (nvidia, nvidia-390xx)
#   - btrfs, dm-crypt for disk options

# ── Modules ───────────────────────────────────────────────────────────────────
# Modules to preload into every initramfs
MODULES=(btrfs)

# ── Files ─────────────────────────────────────────────────────────────────────
# Additional files to include
FILES=()

# ── Hooks ─────────────────────────────────────────────────────────────────────
# Apollo hook order:
#   base → udev → autodetect → modconf → keyboard → keymap →
#   plymouth → block → filesystems → fsck
#
# NOTE: plymouth must come BEFORE encrypt/lvm2 to show during unlock.
HOOKS=(base udev autodetect microcode modconf keyboard keymap consolefont
       plymouth block encrypt lvm2 filesystems fsck)

# ── Compression ───────────────────────────────────────────────────────────────
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-15 --threads=0)
