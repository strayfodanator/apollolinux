# Apollo Linux — LightDM GTK Greeter
# /etc/lightdm/lightdm-gtk-greeter.conf
#
# This configures the login screen with Apollo branding.

[greeter]
# Theme
theme-name     = Apollo-Dark
icon-theme-name = Papirus-Dark
cursor-theme-name = Bibata-Modern-Classic
cursor-theme-size = 24
font-name      = FiraCode Nerd Font 11

# Background
# Will be replaced by the apollo-themes package with the official wallpaper
background     = /usr/share/apollo/wallpapers/apollo-greeter.png
default-user-image = /usr/share/apollo/icons/user-avatar.png

# Layout
position       = 50%, 50%
panel-position = bottom

# Show clock
clock-format   = %H:%M · %A, %d %B %Y

# Indicators in greeter panel
indicators     = ~host;~spacer;~session;~clock;~spacer;~power

# Appearance tweaks
xft-antialias  = true
xft-dpi        = 96
xft-hintstyle  = hintfull
xft-rgba       = rgb

# Extra
user-background       = false
hide-user-image        = false
allow-debugging        = false
screensaver-timeout    = 60
