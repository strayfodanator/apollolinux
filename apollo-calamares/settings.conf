---
# Apollo Linux — Main Calamares Settings
# This file controls the overall installer pipeline and module sequence

# ── Branding ─────────────────────────────────────────────────────────────────
branding: apollo

# ── Installer behavior ───────────────────────────────────────────────────────
prompt-install: true        # Ask for confirmation before writing to disk
dont-chroot: false          # We do chroot (normal installation)
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true   # Prevent cancel mid-install
hide-back-and-next-during-exec: false
quit-at-end: false

# ── Logging ──────────────────────────────────────────────────────────────────
log-file: "/var/log/Calamares/apollo-install.log"
crash-reporting-url: ""

# ── Module search paths ───────────────────────────────────────────────────────
modules-search:
  - local
  - /usr/lib/calamares/modules

# ── Installation sequence ────────────────────────────────────────────────────
# Each step corresponds to a page or background job in Calamares.
# Apollo modules are prefixed with "apollo-"

sequence:
  # PHASE 1: Show phase — user-facing pages (before writing to disk)
  - show:
    - welcome                   # Welcome screen + locale detection
    - locale                    # Language / timezone selection
    - keyboard                  # Keyboard layout
    - apollo-desktop-choice     # 🖥️  Apollo Desktop vs Hyprland (with hardware recommendation)
    - partition                 # Disk partitioning
    - users                     # Create user account
    - summary                   # Review before install

  # PHASE 2: Execute phase — background jobs (installing to disk)
  - exec:
    - apollo-detect             # 🔍 Detect GPU/RAM/CPU → set GlobalStorage vars
    - partition                 # Write partitions
    - mount                     # Mount target
    - unpackfs                  # Unpack base system from squashfs
    - machineid                 # Generate /etc/machine-id
    - fstab                     # Generate /etc/fstab
    - locale                    # Set locale in target
    - keyboard                  # Set keyboard in target
    - localecfg                 # Extra locale config
    - luksbootkeyfile           # (no-op if no encryption)
    - initcpiocfg               # Configure mkinitcpio
    - initcpio                  # Run mkinitcpio
    - apollo-drivers            # 🎮 Install correct GPU drivers from local cache
    - apollo-desktop-select     # 🖥️  Install chosen desktop (Apollo Desktop or Hyprland)
    - networkcfg                # Configure NetworkManager
    - hwclock                   # Set hardware clock
    - services-systemd          # Enable systemd services
    - grubcfg                   # Configure GRUB
    - bootloader                # Install GRUB
    - preservefiles             # Copy logs to target
    - packages                  # Install any remaining packages
    - removeuser                # Remove live user
    - umount                    # Unmount target

  # PHASE 3: Final show — post-install page
  - show:
    - finished                  # Done! Show restart button
