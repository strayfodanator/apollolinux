# Apollo Desktop — picom compositor configuration
# Optimized for legacy hardware (GT 610 class) + modern systems
# Philosophy: subtle effects that don't cost performance

# ── Backend ─────────────────────────────────────────────────────────────────
# xrender: compatible with ALL hardware including very old cards
# glx: better performance on modern hardware
# Calamares install script will switch to glx if GPU is modern
backend = "xrender";

# ── General ──────────────────────────────────────────────────────────────────
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

# ── Shadows ──────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 14;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;
shadow-color = "#000000";

# No shadows on: panels, docks, tooltips, menus
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Ulauncher'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c",
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
  "class_g = 'quickshell'",   # Apollo Shell panels — no shadow
  "class_g = 'QuickShell'",
  "name = 'Apollo Panel'",
];

# ── Fading ────────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 5;

fade-exclude = [
  "class_g = 'quickshell'",
  "class_g = 'QuickShell'",
];

# ── Opacity ───────────────────────────────────────────────────────────────────
inactive-opacity = 0.96;
active-opacity   = 1.0;
frame-opacity    = 1.0;
inactive-opacity-override = false;

# Keep these opaque
opacity-rule = [
  "100:class_g = 'Alacritty'",
  "100:class_g = 'firefox'",
  "100:class_g = 'Chromium'",
  "100:class_g = 'vlc'",
  "100:class_g = 'mpv'",
  "100:window_type = 'dock'",
  "100:class_g = 'quickshell'",
  "100:class_g = 'QuickShell'",
];

# ── Blur ─────────────────────────────────────────────────────────────────────
# Blur is OFF by default on legacy hardware.
# Enabled via Apollo Control Center on capable systems.
blur-method = "dual_kawase";
blur-strength = 5;

blur-background = false;  # Changed to true by apollo-control on modern GPU

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "class_g = 'quickshell'",
  "class_g = 'QuickShell'",
];

# ── Rounded Corners ───────────────────────────────────────────────────────────
# corner-radius: set via picom fork (picom with rounded corners patch)
# Apollo uses picom-git from AUR which supports corner-radius natively
corner-radius = 10;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'quickshell'",
  "class_g = 'QuickShell'",
];

# ── Windows ───────────────────────────────────────────────────────────────────
wintypes:
{
  tooltip      = { fade = true; shadow = false; focus = true; full-shadow = false; };
  dock         = { shadow = false; clip-shadow-above = true; };
  dnd          = { shadow = false; };
  popup_menu   = { opacity = 0.98; shadow = false; };
  dropdown_menu = { opacity = 0.98; shadow = false; };
  menu         = { shadow = false; };
  notification = { shadow = false; };
};
