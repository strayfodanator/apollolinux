# Apollo Linux — hypridle configuration
# Dims screen → locks → suspends after inactivity
# ~/.config/hypr/hypridle.conf

general {
    lock_cmd         = pidof hyprlock || hyprlock    # lock only if not already locked
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit    = false
    ignore_systemd_inhibit = false
}

# Step 1: Dim screen after 4 minutes
listener {
    timeout  = 240
    on-timeout = brightnessctl -s set 30%    # dim to 30%
    on-resume  = brightnessctl -r             # restore brightness
}

# Step 2: Lock screen after 5 minutes
listener {
    timeout  = 300
    on-timeout = loginctl lock-session
    on-resume  = hyprctl dispatch dpms on
}

# Step 3: Turn off display after 6 minutes
listener {
    timeout  = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Step 4: Suspend after 15 minutes
listener {
    timeout  = 900
    on-timeout = systemctl suspend
}
