# Apollo Linux — Hyprland Configuration
# Mode: Hyprland (Wayland) — for AMD and modern NVIDIA GPUs
# ~/.config/hypr/hyprland.conf

# ── Monitors ─────────────────────────────────────────────────────────────────
# Auto-detect all monitors
monitor=,preferred,auto,auto

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = pipewire && pipewire-pulse && wireplumber
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hyprpaper
exec-once = hypridle
exec-once = quickshell -config /usr/share/apollo/shell/main.qml  # AX Shell / Apollo Shell
exec-once = ulauncher --hide-window

# First boot welcome
exec-once = [ ! -f ~/.config/apollo/.welcome-shown ] && apollo-welcome && touch ~/.config/apollo/.welcome-shown

# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in           = 6
    gaps_out          = 12
    border_size       = 1
    col.active_border = rgba(6C8EFFee) rgba(A78BFAee) 45deg
    col.inactive_border = rgba(2e3248aa)
    layout            = dwindle
    resize_on_border  = true
    allow_tearing     = false
}

# ── Decoration (window appearance) ───────────────────────────────────────────
decoration {
    rounding = 10

    # Shadows
    shadow {
        enabled       = true
        range         = 20
        render_power  = 3
        color         = rgba(000000aa)
        color_inactive = rgba(00000066)
    }

    # Blur
    blur {
        enabled       = true
        size          = 6
        passes        = 3
        new_optimizations = true
        xray          = false
        ignore_opacity = false
        popups        = false
    }

    active_opacity   = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true

    # Custom bezier curves
    bezier = overshot,    0.05, 0.9, 0.1, 1.05
    bezier = smoothOut,   0.36, 0,   0.66, -0.56
    bezier = smoothIn,    0.25, 1,   0.5,  1
    bezier = apolloCurve, 0.16, 1,   0.3,  1

    animation = windows,    1, 5,  overshot,    slide
    animation = windowsOut, 1, 4,  smoothOut,   slide
    animation = border,     1, 8,  default
    animation = borderangle,1, 8,  default,     loop
    animation = fade,       1, 5,  smoothIn
    animation = workspaces, 1, 5,  apolloCurve, slidevert
    animation = specialWorkspace, 1, 4, apolloCurve, slide
}

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    kb_options   = 
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll   = true
        tap-to-click     = true
        drag_lock        = false
        disable_while_typing = true
        scroll_factor    = 0.8
    }

    accel_profile = flat
}

# ── Gestures (touchpad) ───────────────────────────────────────────────────────
gestures {
    workspace_swipe          = true
    workspace_swipe_fingers  = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert   = true
    workspace_swipe_cancel_ratio = 0.15
}

# ── Layouts ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile         = true
    preserve_split     = true
    smart_split        = false
    smart_resizing     = true
}

master {
    new_status        = master
    new_on_top        = false
    mfact             = 0.5
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = false
    focus_on_activate       = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}

# ── Environment variables ─────────────────────────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GTK_THEME,Apollo-Dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── XDG Portal ───────────────────────────────────────────────────────────────
# xdg-desktop-portal-hyprland runs as a service

# ── Workspace assignments ─────────────────────────────────────────────────────
workspace = 1, name:Home,   persistent:true
workspace = 2, name:Browser,persistent:true
workspace = 3, name:Code,   persistent:true
workspace = 4, name:Files,  persistent:true
workspace = 5, name:Media,  persistent:true
workspace = 6, name:Chat,   persistent:true
workspace = 7, name:Games,  persistent:true
workspace = 8, name:Work,   persistent:true
workspace = 9, name:Other

# ── Keybindings ──────────────────────────────────────────────────────────────
$mod = SUPER

# Applications
bind = $mod, Return, exec, alacritty
bind = $mod, E,      exec, thunar
bind = $mod, SPACE,  exec, ulauncher-toggle
bind = $mod, P,      exec, apollo-control
bind = $mod, B,      exec, xdg-open https://

# Window management
bind = $mod,       Q,        killactive
bind = $mod,       M,        fullscreen
bind = $mod,       H,        togglefloating
bind = $mod SHIFT, SPACE,    togglefloating
bind = $mod,       F,        fullscreen, 1    # Fake fullscreen (keep decorations)
bind = $mod ALT,   RETURN,   togglesplit

# Snap tile / resize
bind = $mod, left,  movewindow, l
bind = $mod, right, movewindow, r
bind = $mod, up,    movewindow, u
bind = $mod, down,  movewindow, d

# Resize with Super+Alt+arrows
binde = $mod ALT, left,  resizeactive, -40 0
binde = $mod ALT, right, resizeactive,  40 0
binde = $mod ALT, up,    resizeactive,  0 -40
binde = $mod ALT, down,  resizeactive,  0  40

# Move floating windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Switch workspace with scroll on desktop
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Previous/Next workspace
bind = $mod CTRL, right, workspace, e+1
bind = $mod CTRL, left,  workspace, e-1

# Special workspace (scratchpad)
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetospecialworkspace, magic

# Screenshot
bind = ,       Print,      exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
bind = $mod,   Print,      exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SHIFT,  Print,      exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Volume
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Media
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# Lock
bind = $mod, l, exec, hyprlock

# Apollo sidebar
bind = $mod, S, exec, apollo-shell-action toggle-sidebar

# Reload config
bind = $mod SHIFT, R, exec, hyprctl reload

# Session
bind = $mod SHIFT, E, exec, apollo-session-menu

# ── Window Rules ─────────────────────────────────────────────────────────────
windowrule = float, class:^(Pavucontrol)$
windowrule = float, class:^(Blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(galculator)$
windowrule = float, class:^(Ulauncher)$
windowrule = center, class:^(Ulauncher)$
windowrule = noborder, class:^(Ulauncher)$
windowrule = noshadow, class:^(Ulauncher)$

windowrule = workspace 2, class:^(firefox)$
windowrule = workspace 2, class:^(chromium)$
windowrule = workspace 5, class:^(vlc)$
windowrule = workspace 5, class:^(mpv)$
windowrule = workspace 7, class:^(steam)$

# Floating rules for dialogs
windowrule = float, title:^(Confirm)
windowrule = float, title:^(Open File)
windowrule = float, title:^(Save As)

# Layer rules (panels)
layerrule = blur, quickshell
layerrule = blur, ulauncher
