# Apollo Linux — hyprlock screen locker config
# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar   = false
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    ignore_empty_input    = false
}

background {
    monitor     =
    path        = screenshot
    blur_size   = 7
    blur_passes = 4
    brightness  = 0.6
    contrast    = 0.9
    vibrancy    = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor       =
    size          = 300, 50
    outline_thickness = 2
    dots_size     = 0.3
    dots_spacing  = 0.2
    dots_center   = true
    dots_rounding = -1

    outer_color   = rgba(2e3248ff)
    inner_color   = rgba(1a1d27dd)
    font_color    = rgba(E8EAF0ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##8890A4">Password...</span>

    check_color   = rgba(6C8EFFff)
    fail_color    = rgba(F87171ff)
    fail_text     = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    capslock_color = rgba(FBBF24ff)
    numlock_color  = -1

    rounding = 10
    shadow_passes = 2
    shadow_size   = 4

    position = 0, -80
    halign   = center
    valign   = center
}

label {
    monitor   =
    text      = cmd[update:1000] echo "$(date +'%H:%M')"
    color     = rgba(E8EAF0ff)
    font_size = 64
    font_family = FiraCode Nerd Font Bold

    position  = 0, 160
    halign    = center
    valign    = center

    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(000000aa)
}

label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color     = rgba(8890A4ff)
    font_size = 16
    font_family = FiraCode Nerd Font

    position  = 0, 88
    halign    = center
    valign    = center
}

label {
    monitor   =
    text      = Hi there, $USER 
    color     = rgba(E8EAF0ff)
    font_size = 14
    font_family = FiraCode Nerd Font

    position  = 0, -140
    halign    = center
    valign    = center
}
