# Apollo Linux — hyprpaper configuration
# ~/.config/hypr/hyprpaper.conf

# Preload both wallpapers into memory (fast switching)
preload = /usr/share/apollo/wallpapers/apollo-dark.png
preload = /usr/share/apollo/wallpapers/apollo-light.png

# Apply dark wallpaper by default to all monitors
wallpaper = ,/usr/share/apollo/wallpapers/apollo-dark.png

# To switch to light mode, run:
#   hyprctl hyprpaper wallpaper ",/usr/share/apollo/wallpapers/apollo-light.png"
# Or use Apollo Control Center → Desktop → Wallpaper

# Disable IPC (security)
ipc = off

# Splash screen (first load)
splash = false
