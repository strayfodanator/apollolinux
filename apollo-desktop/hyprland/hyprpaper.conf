# Apollo Linux — hyprpaper configuration
# ~/.config/hypr/hyprpaper.conf

# Preload wallpaper into memory
preload = /usr/share/apollo/wallpapers/apollo-default.png

# Apply to all monitors
wallpaper = ,/usr/share/apollo/wallpapers/apollo-default.png

# Disable IPC (security)
ipc = off

# Splash screen (first load)
splash = false
